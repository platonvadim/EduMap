kind = "web"
previewPath = "/"
title = "EduMap Moldova"
version = "1.0.0"
id = "artifacts/edumap-moldova"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23369

[services.development]
run = "pnpm --filter @workspace/edumap-moldova run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edumap-moldova", "run", "build" ]
publicDir = "artifacts/edumap-moldova/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23369"
BASE_PATH = "/"
